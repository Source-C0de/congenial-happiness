version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: contacthub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contacthub
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  api:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: contacthub
      DB_SSL_MODE: disable
      JWT_SECRET: dev-secret-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      DATABASE_URL: postgres://postgres:password@db:5432/contacthub?sslmode=disable
    volumes:
      - ./.env:/app/.env
volumes:
  postgres_data:
