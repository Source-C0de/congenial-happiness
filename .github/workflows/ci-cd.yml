name : contacthub CI/CD pipeline


on:
    push:
        branches: [ "main", "develop" ]
    pull_request:
        branches: ["main"]
env:
    GO_VERSION: "1.24"
    BINARY_NAME: "contacthub"
    IMAGE_NAME: "ghcr.io/${{ github.repository }}:latest"

jobs:
    # Job 1 : Lint & Vet (Fast Feedback)
    lint:
        name: Lint & Code Quality
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.24'
                cache: true

            - name: golangci-lint
              uses: golangci/golangci-lint-action@v6
              with:
                version: latest
                args: --timeout=5m

    # Job 2 : Test (Parallel & Cached)
    test:
        name: Run Unit Tests
        runs-on: ubuntu-latest
        needs: lint # Only run if lint passes
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                go-version: ${{ env.GO_VERSION }}
                cache: true

            - name: Run Tests with Coverage
              run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Upload Coverage Report
              uses: codecov/codecov-action@v4
              with:
                file: ./coverage.out
                fail_ci_if_error: false #
    build:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.24'
            - name: Install dependencies
              run: go mod download
            - name: Build
              run: go build -o contacthub ./cmd/server/main.go
    